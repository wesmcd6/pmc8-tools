<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ExplorestarsLite</title>
    <base href="/" />
    <!-- Google Fonts removed — blocks page load when offline (field use) -->
    <!-- <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" /> -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="_content/ExplorestarsLite.UI/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ExplorestarsLite.Pwa.styles.css" rel="stylesheet" />
    <link href="ExplorestarsLite.UI.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;color:#4dabf7;font-family:Roboto,sans-serif;background:#0d0d1a;">
            <img src="_content/ExplorestarsLite.UI/splash-icon.png" alt="ExplorestarsLite" style="width:180px;height:180px;margin-bottom:24px;" />
            <div style="font-size:1.4rem;font-weight:600;">ExplorestarsLite</div>
            <div style="font-size:0.85rem;color:#666;margin-top:4px;">v1.3.2</div>
            <div style="font-size:0.85rem;color:#888;margin-top:8px;">Loading...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">x</a>
    </div>
    <script src="_content/ExplorestarsLite.UI/js/altvstime.js"></script>
    <script src="_content/ExplorestarsLite.UI/js/thumbpad.js"></script>
    <script src="_content/ExplorestarsLite.UI/js/polar.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <script>
        function saveSettings(json) { localStorage.setItem('eslite_settings', json); }
        function loadSettings() { return localStorage.getItem('eslite_settings'); }
        function saveCustomTargets(json) { localStorage.setItem('eslite_custom_targets', json); }
        function loadCustomTargets() { return localStorage.getItem('eslite_custom_targets'); }
        function getGpsPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) { reject(new Error('GPS unavailable')); return; }
                navigator.geolocation.getCurrentPosition(
                    pos => resolve([pos.coords.latitude, pos.coords.longitude]),
                    err => reject(new Error(err.code === 1 ? 'denied' : err.code === 2 ? 'unavailable' : 'timeout')),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }
    </script>
</body>

</html>
